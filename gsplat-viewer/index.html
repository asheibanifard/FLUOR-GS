<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FLUOR-GS — gsplat.js Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: system-ui, sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #overlay {
            position: fixed; top: 12px; left: 12px; z-index: 10;
            color: #eee; font-size: 13px;
            background: rgba(0,0,0,0.6); padding: 8px 14px;
            border-radius: 6px; pointer-events: none;
        }
        #progress-dialog {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 20; background: rgba(0,0,0,0.85); color: #fff;
            padding: 24px 36px; border-radius: 10px; border: none;
            font-size: 16px; text-align: center;
        }
        #progress-dialog::backdrop { background: rgba(0,0,0,0.4); }
        progress { width: 260px; height: 8px; margin-top: 12px; display: block; }
        #drop-hint {
            position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
            color: #999; font-size: 12px; z-index: 10; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="overlay">FLUOR-GS — gsplat.js Viewer</div>
    <div id="drop-hint">Drag & drop a .ply or .splat file to load a different model</div>

    <dialog id="progress-dialog" open>
        Loading model…
        <progress id="progress-indicator" max="100" value="0"></progress>
    </dialog>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
